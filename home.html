<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZYNX - Home</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #050308;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* Header Section */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            margin-top: 10px;
        }
        .menu-btn {
            width: 40px;
            height: 40px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
        }
        .brand-logo {
            font-size: 28px;
            font-weight: bold;
            letter-spacing: 3px;
            text-decoration: none;
            color: white;
        }
        .brand-logo span {
            color: #a855f7;
        }
        .noti-btn {
            position: relative;
            font-size: 20px;
            color: #ccc;
        }
        .noti-dot {
            position: absolute;
            top: -2px;
            right: -2px;
            width: 8px;
            height: 8px;
            background: #ff4d4d;
            border-radius: 50%;
            border: 2px solid #050308;
        }

        /* Welcome Text */
        .welcome-section {
            padding: 20px;
        }
        .welcome-section h2 {
            font-size: 26px;
            margin-bottom: 5px;
        }
        .welcome-section p {
            color: #888;
            font-size: 14px;
        }

        /* Cards Grid */
        .cards-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            padding: 20px;
        }

        .card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 20px;
            position: relative;
            transition: 0.3s;
            cursor: pointer;
            text-decoration: none;
            color: white;
            display: block;
        }
        .card:hover {
            border-color: #a855f7;
            background: rgba(168, 85, 247, 0.05);
            transform: translateY(-5px);
        }

        .icon-box {
            width: 45px;
            height: 45px;
            border-radius: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 22px;
            margin-bottom: 15px;
        }

        /* Specific Card Colors */
        .title-card .icon-box { background: #6d28d9; }
        .hashtag-card .icon-box { background: #2563eb; }
        .thumbnail-card {
            grid-column: span 2;
            display: flex;
            align-items: flex-start;
        }
        .thumbnail-card .icon-box { background: #db2777; margin-right: 15px; }

        .card-info h3 {
            font-size: 16px;
            margin: 0 0 5px 0;
        }
        .card-info p {
            font-size: 12px;
            color: #888;
            line-height: 1.4;
            margin: 0;
        }

        .arrow-btn {
            position: absolute;
            bottom: 15px;
            right: 15px;
            width: 30px;
            height: 30px;
            background: rgba(168, 85, 247, 0.2);
            color: #a855f7;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 12px;
        }

        /* Bottom Navigation */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            width: 100%;
            background: rgba(10, 10, 15, 0.95);
            backdrop-filter: blur(10px);
            display: flex;
            justify-content: space-around;
            padding: 15px 0 25px 0;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 30px 30px 0 0;
        }
        .nav-item {
            text-align: center;
            color: #666;
            text-decoration: none;
            font-size: 11px;
            transition: 0.3s;
            flex: 1;
        }
        .nav-item i {
            font-size: 20px;
            display: block;
            margin-bottom: 5px;
            padding: 10px;
            border-radius: 12px;
        }
        .nav-item.active {
            color: #a855f7;
        }
        .nav-item.active i {
            background: rgba(168, 85, 247, 0.1);
        }

        /* Hidden spacing for scroll */
        .spacer { height: 100px; }

    </style>
</head>
<body>

    <header class="header">
        <div class="menu-btn"><i class="fas fa-bars"></i></div>
        <a href="home.html" class="brand-logo">ZYN<span>X</span></a>
        <div class="noti-btn">
            <i class="far fa-bell"></i>
            <span class="noti-dot"></span>
        </div>
    </header>

    <section class="welcome-section">
        <h2>Hi, Creator! 👋</h2>
        <p>What would you like to create today?</p>
    </section>

    <div class="cards-container">
        
        <a href="title-gen.html" class="card title-card">
            <div class="icon-box"><i class="fas fa-font"></i></div>
            <div class="card-info">
                <h3>Title Generator</h3>
                <p>Generate SEO friendly titles in seconds</p>
            </div>
            <div class="arrow-btn"><i class="fas fa-arrow-right"></i></div>
        </a>

        <a href="hashtag-gen.html" class="card hashtag-card">
            <div class="icon-box"><i class="fas fa-hashtag"></i></div>
            <div class="card-info">
                <h3>Hashtag Generator</h3>
                <p>Find trending & best hashtags for your content</p>
            </div>
            <div class="arrow-btn"><i class="fas fa-arrow-right"></i></div>
        </a>

        <a href="thumbnail.html" class="card thumbnail-card">
            <div class="icon-box"><i class="far fa-image"></i></div>
            <div class="card-info">
                <h3>Thumbnail Maker</h3>
                <p>Create stunning thumbnails that get more clicks</p>
            </div>
            <div class="arrow-btn"><i class="fas fa-arrow-right"></i></div>
        </a>
    </div>

    <div class="spacer"></div>

    <nav class="bottom-nav">
        <a href="title-gen.html" class="nav-item">
            <i class="fas fa-font"></i>
            <span>Title</span>
        </a>
        <a href="hashtag-gen.html" class="nav-item">
            <i class="fas fa-hashtag"></i>
            <span>Hashtag</span>
        </a>
        <a href="thumbnail.html" class="nav-item">
            <i class="far fa-image"></i>
            <span>Thumbnail</span>
        </a>
        <a href="profile.html" class="nav-item">
            <i class="far fa-user"></i>
            <span>Profile</span>
        </a>
    </nav>

</body>
</html>
