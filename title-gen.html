<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Title Generator - ZYNX</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #050308;
            color: white;
            font-family: 'Segoe UI', Tahoma, sans-serif;
        }

        /* Header Navigation */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
        }
        .back-btn, .history-btn {
            width: 40px;
            height: 40px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            color: #ccc;
            text-decoration: none; /* Link underline remove */
        }

        /* Hero Icon & Title */
        .hero-section {
            text-align: center;
            margin-top: 10px;
        }
        .hero-icon {
            width: 60px;
            height: 60px;
            background: #6d28d9;
            border-radius: 15px;
            display: inline-flex;
            justify-content: center;
            align-items: center;
            font-size: 30px;
            font-weight: bold;
            box-shadow: 0 0 20px rgba(109, 40, 217, 0.4);
        }
        .hero-section h2 { font-size: 18px; margin: 15px 0 5px; }
        .dots { color: #a855f7; letter-spacing: 5px; font-weight: bold; }

        /* Form Controls */
        .content-area { padding: 20px; }
        label { display: block; font-size: 14px; margin-bottom: 10px; color: #eee; }
        
        .input-box {
            position: relative;
            margin-bottom: 5px;
        }
        .input-box i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #888;
        }
        .input-box input, .select-box {
            width: 100%;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 15px 15px 15px 45px;
            border-radius: 12px;
            color: white;
            box-sizing: border-box;
            outline: none;
        }
        .char-count { text-align: right; font-size: 12px; color: #666; margin-bottom: 20px; }

        /* Chips / Title Type */
        .chips-container {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
            overflow-x: auto;
        }
        .chip {
            padding: 10px 18px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            font-size: 13px;
            cursor: pointer;
            white-space: nowrap;
        }
        .chip.active {
            background: linear-gradient(90deg, #6d28d9, #d946ef);
            border: none;
        }

        /* Generate Button */
        .gen-btn {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(90deg, #6d28d9, #d946ef);
            color: white;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        /* Results List */
        .results-section {
            margin-top: 30px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            padding: 15px;
        }
        .results-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        .copy-all { color: #a855f7; font-size: 13px; cursor: pointer; }

        .result-item {
            background: rgba(255, 255, 255, 0.04);
            border-radius: 12px;
            padding: 12px 15px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .res-left { display: flex; align-items: center; gap: 12px; }
        .num {
            width: 24px;
            height: 24px;
            background: rgba(109, 40, 217, 0.2);
            color: #a855f7;
            border-radius: 6px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 12px;
            font-weight: bold;
        }
        .title-text { font-size: 14px; color: #ddd; }
        .copy-icon { color: #888; font-size: 14px; cursor: pointer; }

    </style>
</head>
<body>

    <div class="top-bar">
        <a href="home.html" class="back-btn"><i class="fas fa-arrow-left"></i></a>
        <h3>Title Generator</h3>
        <div class="history-btn"><i class="fas fa-history"></i></div>
    </div>

    <div class="hero-section">
        <div class="hero-icon">T</div>
        <h2>Generate SEO friendly titles in seconds</h2>
        <div class="dots">— — —</div>
    </div>

    <div class="content-area">
        <label>Enter Your Topic</label>
        <div class="input-box">
            <i class="fas fa-search"></i>
            <input type="text" placeholder="e.g. How to rank YouTube videos fast">
        </div>
        <div class="char-count">0/100</div>

        <label>Select Category</label>
        <div class="input-box">
            <i class="fas fa-th-large"></i>
            <select class="select-box" style="padding-left: 45px; appearance: none;">
                <option>Technology</option>
                <option>Vlog</option>
                <option>Education</option>
            </select>
            <i class="fas fa-chevron-down" style="left: auto; right: 15px;"></i>
        </div>

        <label>Title Type</label>
        <div class="chips-container">
            <div class="chip active">SEO Friendly</div>
            <div class="chip">Catchy</div>
            <div class="chip">Questions</div>
            <div class="chip">How To</div>
        </div>

        <button class="gen-btn">
            <i class="fas fa-sparkles"></i> Generate Titles
        </button>

        <div class="results-section">
            <div class="results-header">
                <span>Generated Titles</span>
                <span class="copy-all"><i class="far fa-copy"></i> Copy All</span>
            </div>

            <div id="resultsList">
                <div class="result-item">
                    <div class="res-left">
                        <div class="num">1</div>
                        <div class="title-text">How to Rank YouTube Videos Fast in 2024</div>
                    </div>
                    <i class="far fa-copy copy-icon"></i>
                </div>
                <div class="result-item">
                    <div class="res-left">
                        <div class="num">2</div>
                        <div class="title-text">YouTube SEO: Rank Your Videos on Top</div>
                    </div>
                    <i class="far fa-copy copy-icon"></i>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
