<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZYNX - Login</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #050308;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* Language Selector */
        .lang-dropdown {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 8px 15px;
            border-radius: 10px;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* Logo Section */
        .logo-container {
            text-align: center;
            margin-bottom: 40px;
        }
        .logo-img {
            width: 120px;
            margin-bottom: 10px;
        }
        .brand-name {
            font-size: 42px;
            font-weight: bold;
            letter-spacing: 5px;
            margin: 0;
        }
        .brand-name span { color: #a855f7; }
        .tagline {
            font-size: 12px;
            letter-spacing: 4px;
            color: #888;
            margin-top: 5px;
            text-transform: uppercase;
        }

        /* Welcome Text */
        .welcome-text {
            text-align: center;
            margin-bottom: 30px;
        }
        .welcome-text h2 { font-size: 24px; margin: 0; }
        .welcome-text p { color: #666; font-size: 14px; margin-top: 5px; }

        /* Form */
        .login-form {
            width: 90%;
            max-width: 350px;
        }
        .input-group {
            position: relative;
            margin-bottom: 20px;
        }
        .input-group i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #a855f7;
        }
        .input-group input {
            width: 100%;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 15px 15px 15px 45px;
            border-radius: 12px;
            color: white;
            box-sizing: border-box;
            outline: none;
        }
        .password-toggle {
            position: absolute;
            right: 15px;
            left: auto !important;
            color: #666 !important;
            cursor: pointer;
        }

        /* Options */
        .form-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 13px;
            margin-bottom: 30px;
        }
        .remember-me { display: flex; align-items: center; gap: 8px; color: #888; }
        .forgot-pw { color: #a855f7; text-decoration: none; }

        /* Login Button - LINK ADDED HERE */
        .login-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(90deg, #6d28d9, #d946ef);
            border: none;
            border-radius: 12px;
            color: white;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(109, 40, 217, 0.3);
            transition: 0.3s;
            text-align: center;
            display: block;
            text-decoration: none;
        }
        .login-btn:hover { opacity: 0.9; transform: translateY(-2px); }

        /* Footer */
        .signup-text {
            margin-top: 30px;
            font-size: 14px;
            color: #888;
        }
        .signup-text a { color: #a855f7; text-decoration: none; font-weight: bold; }

    </style>
</head>
<body>

    <div class="lang-dropdown">
        <i class="fas fa-globe"></i> English <i class="fas fa-chevron-down"></i>
    </div>

    <div class="logo-container">
        <div style="font-size: 80px; color: #a855f7; margin-bottom: 10px;">
            <i class="fab fa-autoprefixer"></i>
        </div>
        <h1 class="brand-name">ZYN<span>X</span></h1>
        <div class="tagline">CREATE • GENERATE • GROW</div>
    </div>

    <div class="welcome-text">
        <h2>Welcome Back! 👋</h2>
        <p>Login to continue to your account</p>
    </div>

    <div class="login-form">
        <div class="input-group">
            <i class="far fa-envelope"></i>
            <input type="email" placeholder="Email Address">
        </div>

        <div class="input-group">
            <i class="fas fa-lock"></i>
            <input type="password" placeholder="Password">
            <i class="far fa-eye password-toggle"></i>
        </div>

        <div class="form-options">
            <label class="remember-me">
                <input type="checkbox"> Remember me
            </label>
            <a href="#" class="forgot-pw">Forgot Password?</a>
        </div>

        <a href="home.html" class="login-btn">Login</a>

        <div class="signup-text">
            Don't have an account? <a href="#">Sign Up</a>
        </div>
    </div>

</body>
</html>
