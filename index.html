      <!DOCTYPE html>
<html lang="en">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZYNX Login</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<style>
body{
    margin:0;
    font-family:'Segoe UI',sans-serif;
    background:#050308;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    position:relative;
}

/* Background glow (IMPORTANT for same look) */
body::before{
    content:"";
    position:absolute;
    width:300px;
    height:300px;
    background:radial-gradient(circle,#a855f7,transparent);
    bottom:-100px;
    right:-100px;
    opacity:0.4;
}

/* Language */
.lang{
    position:absolute;
    top:20px;
    right:20px;
    border:1px solid rgba(255,255,255,0.1);
    padding:8px 15px;
    border-radius:12px;
    display:flex;
    gap:8px;
    font-size:14px;
}

/* Logo */
.logo{
    text-align:center;
    margin-bottom:30px;
}
.logo i{
    font-size:80px;
    background:linear-gradient(45deg,#7c3aed,#d946ef);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}
.logo h1{
    margin:10px 0 0;
    letter-spacing:6px;
}
.tag{
    font-size:12px;
    color:#888;
    letter-spacing:3px;
}

/* Welcome */
.welcome{
    text-align:center;
    margin-bottom:25px;
}
.welcome p{
    color:#777;
    font-size:14px;
}

/* Form */
.form{
    width:90%;
    max-width:360px;
}

.input{
    position:relative;
    margin-bottom:15px;
}
.input i{
    position:absolute;
    left:15px;
    top:50%;
    transform:translateY(-50%);
    color:#a855f7;
}
.input input{
    width:100%;
    padding:14px 15px 14px 45px;
    border-radius:12px;
    border:1px solid rgba(255,255,255,0.1);
    background:rgba(255,255,255,0.03);
    color:white;
    outline:none;
}

/* Options */
.options{
    display:flex;
    justify-content:space-between;
    font-size:13px;
    margin:10px 0 20px;
}
.options a{color:#d946ef;text-decoration:none;}

/* Button */
.btn{
    width:100%;
    padding:15px;
    border:none;
    border-radius:12px;
    background:linear-gradient(90deg,#7c3aed,#d946ef);
    color:white;
    font-size:16px;
    cursor:pointer;
    box-shadow:0 10px 25px rgba(124,58,237,0.4);
}
.btn:active{transform:scale(0.97);}

/* Footer */
.footer{
    text-align:center;
    margin-top:20px;
    color:#777;
}
.footer span{
    color:#d946ef;
    font-weight:bold;
}

</style>
</head>

<body>

<div class="lang">
<i class="fas fa-globe"></i> English <i class="fas fa-chevron-down"></i>
</div>

<div>

<div class="logo">
<i class="fab fa-autoprefixer"></i>
<h1>ZYNX</h1>
<div class="tag">CREATE • GENERATE • GROW</div>
</div>

<div class="welcome">
<h2>Welcome Back! 👋</h2>
<p>Login to continue to your account</p>
</div>

<div class="form">

<div class="input">
<i class="far fa-envelope"></i>
<input type="email" placeholder="Email Address">
</div>

<div class="input">
<i class="fas fa-lock"></i>
<input type="password" placeholder="Password">
</div>

<div class="options">
<label><input type="checkbox"> Remember me</label>
<a href="#">Forgot?</a>
</div>

<button class="btn" onclick="window.location.href='home.html'">Login</button>

<div class="footer">
Don't have an account? <span>Sign Up</span>
</div>

</div>

</div>

</body>
</html>
