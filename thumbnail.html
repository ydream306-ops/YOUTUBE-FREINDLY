<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thumbnail Maker - ZYNX</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg-dark: #050308;
            --card-bg: rgba(255, 255, 255, 0.03);
            --border-color: rgba(255, 255, 255, 0.1);
            --primary-purple: #a855f7;
            --accent-gradient: linear-gradient(90deg, #6d28d9, #d946ef);
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-dark);
            color: white;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            padding-bottom: 40px;
        }

        /* Top Bar */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
        }
        .icon-btn {
            width: 40px;
            height: 40px;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            color: #eee;
            text-decoration: none;
        }

        .container { padding: 0 20px; }
        h4 { font-size: 14px; font-weight: 500; margin: 20px 0 12px 0; color: #efefef; }

        /* Canvas Size Grid */
        .canvas-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }
        .size-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 12px 5px;
            text-align: center;
            cursor: pointer;
            transition: 0.3s;
        }
        .size-card.active {
            background: rgba(168, 85, 247, 0.1);
            border-color: var(--primary-purple);
        }
        .size-card .dimen { font-size: 11px; font-weight: bold; display: block; }
        .size-card .label { font-size: 9px; color: #888; }

        /* Background Toggle */
        .bg-toggle {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }
        .toggle-btn {
            flex: 1;
            padding: 12px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            background: var(--card-bg);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            cursor: pointer;
        }
        .toggle-btn.active { background: var(--accent-gradient); border: none; }

        /* Color Palette */
        .color-palette { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 5px; }
        .color-circle {
            min-width: 38px;
            height: 38px;
            border-radius: 8px;
            cursor: pointer;
            border: 2px solid transparent;
        }
        .color-circle.active { border-color: white; }

        /* Add Elements Grid */
        .elements-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
        }
        .elem-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 15px 0;
            text-align: center;
            cursor: pointer;
        }
        .elem-card i { font-size: 18px; color: var(--primary-purple); display: block; margin-bottom: 8px; }
        .elem-card span { font-size: 10px; color: #aaa; }

        /* Preview Area */
        .preview-box {
            margin-top: 25px;
            width: 100%;
            aspect-ratio: 16 / 9;
            border-radius: 15px;
            overflow: hidden;
            border: 1px solid var(--border-color);
            background: #121018;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }
        .preview-placeholder { color: #333; font-size: 14px; }

        /* Create Button */
        .create-btn {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 15px;
            background: var(--accent-gradient);
            color: white;
            font-weight: bold;
            font-size: 16px;
            margin-top: 25px;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            box-shadow: 0 10px 20px rgba(109, 40, 217, 0.3);
        }

    </style>
</head>
<body>

    <div class="top-bar">
        <a href="home.html" class="icon-btn"><i class="fas fa-arrow-left"></i></a>
        <div style="font-weight: bold; font-size: 18px;">Thumbnail Maker</div>
        <div class="icon-btn"><i class="fas fa-download"></i></div>
    </div>

    <div class="container">
        <h4>Canvas Size</h4>
        <div class="canvas-grid">
            <div class="size-card active">
                <span class="dimen">1280×720</span>
                <span class="label">YouTube</span>
            </div>
            <div class="size-card">
                <span class="dimen">1920×1080</span>
                <span class="label">Full HD</span>
            </div>
            <div class="size-card">
                <span class="dimen">1080×1350</span>
                <span class="label">Instagram</span>
            </div>
            <div class="size-card">
                <i class="fas fa-expand-arrows-alt" style="font-size: 11px; margin-bottom: 2px;"></i>
                <span class="label">Custom</span>
            </div>
        </div>

        <h4>Background</h4>
        <div class="bg-toggle">
            <div class="toggle-btn active"><i class="fas fa-fill-drip"></i> Color</div>
            <div class="toggle-btn"><i class="far fa-image"></i> Gallery</div>
        </div>

        <div class="color-palette">
            <div class="color-circle active" style="background: #6d28d9;"></div>
            <div class="color-circle" style="background: #2563eb;"></div>
            <div class="color-circle" style="background: #22c55e;"></div>
            <div class="color-circle" style="background: #ef4444;"></div>
            <div class="color-circle" style="background: #ec4899;"></div>
            <div class="color-circle" style="background: #f59e0b;"></div>
        </div>

        <h4>Add Elements</h4>
        <div class="elements-grid">
            <div class="elem-card"><i class="fas fa-font"></i><span>Text</span></div>
            <div class="elem-card"><i class="far fa-image"></i><span>Image</span></div>
            <div class="elem-card"><i class="far fa-smile"></i><span>Emoji</span></div>
            <div class="elem-card"><i class="fas fa-shapes"></i><span>Shape</span></div>
            <div class="elem-card"><i class="fas fa-magic"></i><span>AI Effect</span></div>
        </div>

        <div class="preview-box">
            <span class="preview-placeholder">Thumbnail Preview Area</span>
        </div>

        <button class="create-btn">
            <i class="fas fa-wand-magic-sparkles"></i> Generate Thumbnail
        </button>
    </div>

</body>
</html>
