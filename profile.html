<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZYNX - My Profile</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { margin: 0; background-color: #050308; color: white; font-family: 'Segoe UI', sans-serif; }
        .top-bar { display: flex; align-items: center; padding: 20px; gap: 15px; }
        .back-btn { font-size: 20px; color: white; text-decoration: none; }
        .profile-hero { text-align: center; padding: 30px 20px; }
        .avatar { width: 100px; height: 100px; border-radius: 50%; border: 3px solid #a855f7; margin-bottom: 15px; }
        .user-name { font-size: 22px; margin: 0; }
        .user-email { color: #888; font-size: 14px; margin-top: 5px; }
        .stats-row { display: flex; justify-content: center; gap: 30px; margin-top: 25px; }
        .stat { text-align: center; }
        .stat-val { display: block; font-size: 20px; font-weight: bold; color: #a855f7; }
        .stat-label { font-size: 12px; color: #666; }
        .menu-list { padding: 20px; }
        .menu-item { background: rgba(255,255,255,0.03); padding: 15px; border-radius: 12px; display: flex; align-items: center; gap: 15px; margin-bottom: 10px; cursor: pointer; border: 1px solid rgba(255,255,255,0.05); }
        .menu-item i { color: #a855f7; width: 20px; }
        .logout { color: #ef4444; border-color: rgba(239, 68, 68, 0.2); margin-top: 20px; }
    </style>
</head>
<body>
    <div class="top-bar">
        <a href="home.html" class="back-btn"><i class="fas fa-arrow-left"></i></a>
        <h3>My Profile</h3>
    </div>
    <div class="profile-hero">
        <img src="https://via.placeholder.com/150" class="avatar">
        <h2 class="user-name">Creative User</h2>
        <p class="user-email">user@example.com</p>
        <div class="stats-row">
            <div class="stat"><span class="stat-val">24</span><span class="stat-label">Titles</span></div>
            <div class="stat"><span class="stat-val">12</span><span class="stat-label">Thumbnails</span></div>
        </div>
    </div>
    <div class="menu-list">
        <div class="menu-item"><i class="fas fa-edit"></i> Edit Profile</div>
        <div class="menu-item"><i class="fas fa-history"></i> My Generation History</div>
        <div class="menu-item"><i class="fas fa-shield-alt"></i> Privacy Policy</div>
        <div class="menu-item logout" onclick="window.location.href='index.html'"><i class="fas fa-sign-out-alt"></i> Logout</div>
    </div>
</body>
</html>
