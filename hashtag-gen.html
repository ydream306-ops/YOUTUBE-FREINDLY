<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hashtag Generator - ZYNX</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #050308;
            color: white;
            font-family: 'Segoe UI', Tahoma, sans-serif;
        }

        /* Top Bar */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
        }
        .icon-btn {
            width: 40px;
            height: 40px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            color: #ccc;
            text-decoration: none;
        }

        /* Hero Icon */
        .hero-section {
            text-align: center;
            margin-top: 5px;
        }
        .hero-icon {
            width: 60px;
            height: 60px;
            background: #2563eb;
            border-radius: 15px;
            display: inline-flex;
            justify-content: center;
            align-items: center;
            font-size: 30px;
            box-shadow: 0 0 20px rgba(37, 99, 235, 0.4);
        }
        .hero-section h2 { font-size: 18px; margin: 15px 0 5px; line-height: 1.3; }

        .content-area { padding: 20px; }
        label { display: block; font-size: 14px; margin-bottom: 10px; color: #eee; margin-top: 15px; }
        
        /* Input Field */
        .input-box {
            position: relative;
            margin-bottom: 5px;
        }
        .input-box i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #888;
        }
        .input-box input {
            width: 100%;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 15px 15px 15px 45px;
            border-radius: 12px;
            color: white;
            box-sizing: border-box;
            outline: none;
        }
        .char-count { text-align: right; font-size: 11px; color: #555; }

        /* Platform Selection (Grid) */
        .platform-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 10px;
            margin-bottom: 20px;
        }
        .platform-btn {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 12px;
            border-radius: 12px;
            text-align: center;
            font-size: 13px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .platform-btn.active {
            background: #6d28d9;
            border-color: #a855f7;
        }

        /* Hashtag Type Buttons */
        .type-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 10px;
            margin-bottom: 25px;
        }
        .type-btn {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 12px;
            border-radius: 12px;
            font-size: 13px;
            cursor: pointer;
            text-align: center;
        }
        .type-btn.active { background: #6d28d9; }

        /* Generate Button */
        .gen-btn {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 15px;
            background: linear-gradient(90deg, #6d28d9, #d946ef);
            color: white;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        /* Result Section */
        .results-container {
            margin-top: 25px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            padding: 18px;
        }
        .results-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            font-size: 14px;
        }
        .copy-all { color: #a855f7; cursor: pointer; }

        /* Tags Cloud */
        .tags-cloud {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        .tag {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 8px 14px;
            border-radius: 8px;
            font-size: 12px;
            color: #ddd;
        }

    </style>
</head>
<body>

    <div class="top-bar">
        <a href="home.html" class="icon-btn"><i class="fas fa-arrow-left"></i></a>
        <h3>Hashtag Generator</h3>
        <div class="icon-btn"><i class="fas fa-history"></i></div>
    </div>

    <div class="hero-section">
        <div class="hero-icon"><i class="fas fa-hashtag"></i></div>
        <h2>Find trending & best hashtags<br>for your content</h2>
    </div>

    <div class="content-area">
        <label>Enter Keyword</label>
        <div class="input-box">
            <i class="fas fa-search"></i>
            <input type="text" placeholder="e.g. Travel, Food, Fitness">
        </div>
        <div class="char-count">0/100</div>

        <label>Select Platform</label>
        <div class="platform-grid">
            <div class="platform-btn active"><i class="fab fa-instagram"></i> Instagram</div>
            <div class="platform-btn"><i class="fab fa-youtube"></i> YouTube</div>
            <div class="platform-btn"><i class="fab fa-tiktok"></i> TikTok</div>
        </div>

        <label>Hashtag Type</label>
        <div class="type-grid">
            <div class="type-btn active">Top</div>
            <div class="type-btn">Trending</div>
            <div class="type-btn">Random</div>
        </div>

        <button class="gen-btn">
            <i class="fas fa-sparkles"></i> Generate Hashtags
        </button>

        <div class="results-container">
            <div class="results-header">
                <span>Generated Hashtags</span>
                <span class="copy-all"><i class="far fa-copy"></i> Copy All</span>
            </div>
            <div class="tags-cloud">
                <div class="tag">#travel</div>
                <div class="tag">#explore</div>
                <div class="tag">#trending</div>
                <div class="tag">#viral</div>
            </div>
        </div>
    </div>

</body>
</html>
